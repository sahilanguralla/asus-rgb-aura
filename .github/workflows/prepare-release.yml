name: Prepare Release

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  prepare-release:
    if: contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts
          npm ci

      - name: Calculate and Bump Version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use semantic-release dry-run to get the next version
          NEXT_VERSION=$(npx semantic-release --dry-run | grep 'The next release version is' | sed -n 's/.*is \([0-9.]*\).*/\1/p')
          
          if [ -z "$NEXT_VERSION" ]; then
            echo "No version bump required."
            exit 0
          fi
          
          echo "Next version: $NEXT_VERSION"
          
          # Check current version in changelog to avoid duplicate commits
          CURRENT_VERSION=$(dpkg-parsechangelog -S Version | sed 's/-.*//')
          if [ "$NEXT_VERSION" == "$CURRENT_VERSION" ]; then
            echo "Changelog already updated to $NEXT_VERSION"
            exit 0
          fi
          
          # Update changelog
          dch --newversion ${NEXT_VERSION}-1 --distribution unstable "Automated release preparation for version $NEXT_VERSION"
          
          # Commit and push back to PR branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debian/changelog
          git commit -m "chore(release): prepare version $NEXT_VERSION"
          git push
